name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create hwntools.zip from app/
        run: cd app && zip -r ../hwntools.zip . -x '__pycache__/*' '*.pyc' '.state.json' 'packages/*' '.packages/*' 'hwntools.vbs'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: hwntools.zip
          generate_release_notes: true
