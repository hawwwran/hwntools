name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag is on main
        run: |
          TAG_COMMIT=$(git rev-parse HEAD)
          MAIN_COMMIT=$(git ls-remote origin refs/heads/main | cut -f1)
          if [ "$TAG_COMMIT" != "$MAIN_COMMIT" ]; then
            echo "Tag points to $TAG_COMMIT but main is at $MAIN_COMMIT — skipping."
            exit 1
          fi

      - name: Create hwntools.zip from app/
        run: cd app && zip -r ../hwntools.zip . -x '__pycache__/*' '*.pyc' '.state.json' 'packages/*' '.packages/*' 'hwntools.vbs'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: hwntools.zip
          generate_release_notes: true
