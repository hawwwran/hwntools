name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          TAG_COMMIT=$(git rev-parse HEAD)
          MAIN_COMMIT=$(git ls-remote origin refs/heads/main | cut -f1)
          if [ "$TAG_COMMIT" != "$MAIN_COMMIT" ]; then
            echo "Tag points to $TAG_COMMIT but main is at $MAIN_COMMIT — skipping."
            exit 1
          fi

      - name: Generate VERSION.md
        run: |
          TAG="${{ github.ref_name }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${TAG}$" | head -1)
          {
            echo "# HWN Tools ${TAG}"
            echo ""
            echo "Released: $(date -u +%Y-%m-%d)"
            echo ""
            echo "## Changes"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s" --no-merges
            else
              git log --pretty=format:"- %s" --no-merges
            fi
            echo ""
          } > app/VERSION.md

      - name: Create hwntools.zip from app/
        run: cd app && zip -r ../hwntools.zip . -x '__pycache__/*' '*.pyc' '.state.json' 'packages/*' '.packages/*' 'hwntools.vbs' 'CLAUDE.md'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: hwntools.zip
          generate_release_notes: true
