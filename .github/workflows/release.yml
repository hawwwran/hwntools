name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          git branch --contains "${{ github.ref_name }}" | grep -q 'main' || {
            echo "Tag ${{ github.ref_name }} is not on main branch, skipping release."
            exit 1
          }

      - name: Create hwntools.zip from app/
        run: cd app && zip -r ../hwntools.zip . -x '__pycache__/*' '*.pyc' '.state.json' 'packages/*' '.packages/*' 'hwntools.vbs'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: hwntools.zip
          generate_release_notes: true
